<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a29bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#grad)" />
  <!-- Glow overlay -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#glow)" />
  <!-- Letter N -->
  <text
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="900"
    fill="white"
    letter-spacing="-2"
  >N</text>
  <!-- Small dot accent -->
  <circle cx="50" cy="14" r="5" fill="rgba(255,255,255,0.85)" />
</svg>